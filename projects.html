<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I.R.I.S — Projects</title>
    <meta name="description" content="I.R.I.S project portfolio showcase — browse and manage intern projects.">
    <link rel="stylesheet" href="css/projects.css">
    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</head>

<body>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="app-shell">

        <!-- Sidebar -->
        <aside class="app-sidebar" id="app-sidebar" role="navigation" aria-label="Main navigation">
            <div class="sidebar-brand">
                <div class="sidebar-logo" aria-hidden="true">
                    <img src="img/iris-logo.png" alt="IRIS Logo">
                </div>
                <div class="sidebar-brand-text">
                    <span class="sidebar-title">I.R.I.S</span>
                    <span class="sidebar-slogan">Intern Review & Intelligence System</span>
                </div>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav" aria-label="Page navigation"></nav>
            <div class="sidebar-footer">
                <div class="user-info" id="user-info-sidebar" role="button" tabindex="0" aria-label="User info">
                    <div class="user-avatar" id="user-avatar-sidebar" aria-hidden="true">J</div>
                    <div class="user-meta">
                        <div class="user-name" id="user-name-sidebar">User</div>
                        <div class="user-role" id="user-role-sidebar">Intern</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Topbar -->
        <header class="app-topbar" role="banner">
            <div class="container flex-between" style="height:100%">
                <div class="topbar-left">
                    <button id="hamburger-btn" aria-label="Toggle sidebar" aria-expanded="false">
                        <span class="material-symbols-outlined">menu</span>
                    </button>
                    <span class="topbar-title">Projects</span>
                </div>
                <div class="topbar-right">
                    <button class="info-btn" id="info-btn" aria-label="Platform information">
                        <span class="material-symbols-outlined">info</span>
                    </button>
                    <span class="badge" id="topbar-role-badge">Intern</span>
                    <button class="btn btn-secondary btn-sm" id="logout-btn" aria-label="Sign out">
                        <span class="material-symbols-outlined" style="font-size: 16px;">logout</span>
                        Sign Out
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="app-content" aria-label="Projects showcase">
            <div class="container">
                <div class="projects-header anim-fadeInDown">
                    <div class="page-header" style="margin-bottom:0">
                        <h1 class="page-title">Project Showcase</h1>
                        <p class="page-subtitle" id="project-count-label">Loading projects...</p>
                    </div>
                    <!-- Admin desktop Add button (alternative to FAB) -->
                    <button class="btn btn-primary" id="add-btn-top" style="display:none" aria-label="Add new project">
                        <span class="material-symbols-outlined" style="font-size: 16px;">add</span>
                        Add Project
                    </button>
                </div>

                <!-- Card grid -->
                <div class="auto-grid-cards" id="projects-grid" aria-label="Project cards">
                    <!-- Injected by JS -->
                </div>


                <!-- Permission notice for users -->
                <p class="no-permission-tip" id="no-permission-tip" style="display:none" aria-live="polite">
                    🔒 Only admins can add or remove projects. You can view all projects here.
                </p>
            </div>
        </main>
    </div>

    <!-- FAB (Admin only) -->
    <button class="fab" id="fab-btn" style="display:none" aria-label="Add new project">
        <span aria-hidden="true">+</span>
        <span class="fab-tooltip" aria-hidden="true">Add Project</span>
    </button>

    <!-- Add/Edit Project Modal -->
    <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal" id="project-modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">Add New Project</h2>
                <button class="modal-close" id="modal-close" aria-label="Close modal">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="field-group">
                    <label class="field-label" for="proj-title">Project Title <span
                            style="color:var(--clr-danger)">*</span></label>
                    <input class="field-input" type="text" id="proj-title" placeholder="e.g. InternTrack Platform"
                        required>
                </div>
                <div class="field-group">
                    <label class="field-label" for="proj-desc">Description <span
                            style="color:var(--clr-danger)">*</span></label>
                    <textarea class="field-input" id="proj-desc" rows="4"
                        placeholder="Describe the project, its purpose, and your contributions..." required></textarea>
                </div>
                <div class="field-group">
                    <label class="field-label" for="proj-stack-input">Tech Stack</label>
                    <div class="tags-input-wrap" id="stack-wrap" role="group" aria-label="Tech stack tags">
                        <div id="stack-tags-list"></div>
                        <input class="tags-input" type="text" id="proj-stack-input"
                            placeholder="e.g. JavaScript + Enter" aria-label="Add technology">
                    </div>
                    <span style="font-size:var(--fs-xs);color:var(--clr-text-muted);margin-top:4px">Press Enter or , to
                        add a tech.</span>
                </div>
                <div class="field-group">
                    <label class="field-label" for="proj-github">GitHub URL</label>
                    <input class="field-input" type="url" id="proj-github"
                        placeholder="https://github.com/username/repo">
                </div>
                <div class="field-group">
                    <label class="field-label" for="proj-status">Status</label>
                    <select class="field-input" id="proj-status">
                        <option value="Ongoing">Ongoing</option>
                        <option value="Pending">Pending</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>
                <div class="field-group">
                    <label class="field-label" for="proj-link-type">Link Type</label>
                    <select class="field-input" id="proj-link-type"
                        onchange="document.getElementById('proj-live-label').textContent = this.value === 'Live' ? 'Live URL' : 'Demo URL'; document.getElementById('proj-live').placeholder = this.value === 'Live' ? 'https://yourproject.live' : 'https://yourproject.demo';">
                        <option value="Demo">Demo</option>
                        <option value="Live" selected>Live</option>
                    </select>
                </div>
                <div class="field-group">
                    <label class="field-label" id="proj-live-label" for="proj-live">Live URL</label>
                    <input class="field-input" type="url" id="proj-live" placeholder="https://yourproject.live">
                </div>
                <div class="field-group">
                    <label class="field-label">Screenshot</label>
                    <div class="screenshot-upload" id="screenshot-drop" aria-label="Screenshot upload area">
                        <input type="file" id="proj-screenshot" accept="image/*" aria-label="Upload project screenshot">
                        <div id="screenshot-placeholder">
                            <div aria-hidden="true" style="font-size:2rem;margin-bottom:8px"
                                class="material-symbols-outlined">image</div>
                            <div style="font-size:var(--fs-sm);color:var(--clr-text-secondary)">Click or drag & drop an
                                image</div>
                            <div style="font-size:var(--fs-xs);color:var(--clr-text-muted);margin-top:4px">PNG, JPG, GIF
                                · Max 3MB</div>
                            <label for="proj-screenshot" class="btn btn-secondary btn-sm"
                                style="margin-top:12px;cursor:pointer">Browse File</label>
                        </div>
                        <div id="screenshot-preview-wrap" style="display:none">
                            <div class="screenshot-preview">
                                <img id="screenshot-preview-img" src="" alt="Screenshot preview">
                                <button class="screenshot-reset" id="screenshot-reset" type="button"
                                    aria-label="Remove screenshot">✕ Remove</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
                <button class="btn btn-primary" id="modal-save" aria-label="Save project">
                    <span class="material-symbols-outlined" style="font-size: 16px;">save</span>
                    Save Project
                </button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container" aria-live="polite"></div>

    <script src="js/page-transition.js"></script>

    <script src="js/storage.js"></script>
    <script src="js/admin-popup.js"></script>
    <script src="js/projects.js"></script>
    <script src="js/theme-switcher.js"></script>
</body>

</html>
