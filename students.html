<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I.R.I.S — Interns</title>
    <meta name="description"
        content="I.R.I.S interns overview: view intern profiles, performance scores, and project contributions.">
    <link rel="stylesheet" href="css/students.css">
    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</head>

<body>

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="app-shell">

        <!-- ── Sidebar ── -->
        <aside class="app-sidebar" id="app-sidebar" role="navigation" aria-label="Main navigation">
            <div class="sidebar-brand">
                <div class="sidebar-logo" aria-hidden="true">
                    <img src="img/iris-logo.png" alt="IRIS Logo">
                </div>
                <div class="sidebar-brand-text">
                    <span class="sidebar-title">I.R.I.S</span>
                    <span class="sidebar-slogan">Intern Review & Intelligence System</span>
                </div>
            </div>

            <nav class="sidebar-nav" id="sidebar-nav" aria-label="Page navigation">
                <!-- Injected by JS -->
            </nav>

            <div class="sidebar-footer">
                <div class="user-info" id="user-info-sidebar" role="button" aria-label="User info and logout"
                    tabindex="0">
                    <div class="user-avatar" id="user-avatar-sidebar" aria-hidden="true">A</div>
                    <div class="user-meta">
                        <div class="user-name" id="user-name-sidebar">Loading...</div>
                        <div class="user-role" id="user-role-sidebar">—</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- ── Topbar ── -->
        <header class="app-topbar" role="banner">
            <div class="container flex-between" style="height:100%">
                <div class="topbar-left">
                    <button id="hamburger-btn" aria-label="Toggle sidebar" aria-expanded="false">
                        <span class="material-symbols-outlined">menu</span>
                    </button>
                    <span class="topbar-title" id="topbar-title">Interns</span>
                </div>
                <div class="topbar-right">
                    <button class="info-btn" id="info-btn" aria-label="Platform information">
                        <span class="material-symbols-outlined">info</span>
                    </button>
                    <span class="badge badge-admin" id="topbar-role-badge">Admin</span>
                    <button class="btn btn-secondary btn-sm" id="logout-btn" aria-label="Sign out">
                        <span class="material-symbols-outlined" style="font-size: 16px;">logout</span>
                        Sign Out
                    </button>
                </div>
            </div>
        </header>

        <!-- ── Main Content ── -->
        <main class="app-content" id="app-content" aria-label="Students content">
            <div class="container">

                <!-- Role banner -->
                <div class="role-banner admin card-3d anim-reveal" id="role-banner">
                    <div class="glare"></div>
                    <span class="role-banner-icon material-symbols-outlined" aria-hidden="true"
                        style="font-size: 32px; color: var(--clr-accent);">school</span>
                    <div class="role-banner-text">
                        <div class="role-banner-title" id="welcome-title">Intern Directory</div>
                        <div class="role-banner-sub" id="welcome-sub">Review intern profiles, performance metrics, and
                            project contributions.</div>
                    </div>
                    <span class="badge badge-admin" id="role-badge-main">Admin</span>
                </div>

                <!-- Students Header -->
                <div class="students-header">
                    <div class="header-main-info">
                        <h1><span class="material-symbols-outlined"
                                style="font-size: 32px; vertical-align: middle; margin-right: 8px;">school</span>
                            Interns</h1>
                        <span class="students-count" id="students-count">0 interns</span>
                    </div>
                    <div class="header-search-area">
                        <div class="search-wrap">
                            <span class="material-symbols-outlined search-icon" style="font-size: 18px;">search</span>
                            <input type="text" id="student-search-input" placeholder="Search interns..."
                                class="form-input">
                        </div>
                    </div>
                    <div class="header-actions">
                        <a href="profile-builder.html" id="add-student-btn" class="btn btn-primary btn-sm"
                            aria-label="Add new intern profile">
                            <span class="material-symbols-outlined" style="font-size: 16px;">person_add</span>
                            Add Intern
                        </a>
                    </div>
                </div>

                <!-- Students List -->
                <div class="students-list" id="students-container" aria-label="Intern directory list">
                    <!-- Injected by JS -->
                </div>

            </div>
        </main>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container" aria-live="polite"></div>

    <script src="js/page-transition.js"></script>

    <script src="js/storage.js"></script>
    <script src="js/admin-popup.js"></script>
    <script src="js/students.js"></script>
    <script src="js/theme-switcher.js"></script>
    <script src="js/animation-engine.js"></script>
</body>

</html>
