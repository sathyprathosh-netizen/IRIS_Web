<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I.R.I.S — Profile View</title>
    <meta name="description" content="I.R.I.S: Intern portfolio profile — skills, internship details, and bio.">
    <link rel="stylesheet" href="css/profile-view.css">
    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</head>

<body>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="app-shell">

        <!-- Sidebar -->
        <aside class="app-sidebar" id="app-sidebar" role="navigation" aria-label="Main navigation">
            <div class="sidebar-brand">
                <div class="sidebar-logo" aria-hidden="true">
                    <img src="img/iris-logo.png" alt="IRIS Logo">
                </div>
                <div class="sidebar-brand-text">
                    <span class="sidebar-title">I.R.I.S</span>
                    <span class="sidebar-slogan">Intern Review & Intelligence System</span>
                </div>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav" aria-label="Page navigation"></nav>
            <div class="sidebar-footer">
                <div class="user-info" id="user-info-sidebar" role="button" tabindex="0" aria-label="User info">
                    <div class="user-avatar" id="user-avatar-sidebar" aria-hidden="true">J</div>
                    <div class="user-meta">
                        <div class="user-name" id="user-name-sidebar">User</div>
                        <div class="user-role" id="user-role-sidebar">Intern</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Topbar -->
        <header class="app-topbar" role="banner">
            <div class="container flex-between" style="height:100%">
                <div class="topbar-left">
                    <button id="hamburger-btn" aria-label="Toggle sidebar" aria-expanded="false">
                        <span class="material-symbols-outlined">menu</span>
                    </button>
                    <span class="topbar-title">My Profile</span>
                </div>
                <div class="topbar-right">
                    <button class="info-btn" id="info-btn" aria-label="Platform information">
                        <span class="material-symbols-outlined">info</span>
                    </button>
                    <span class="badge badge-user" id="topbar-role-badge">Intern</span>
                    <button class="btn btn-secondary btn-sm" id="logout-btn" aria-label="Sign out">
                        <span class="material-symbols-outlined" style="font-size: 16px;">logout</span>
                        Sign Out
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="app-content" id="profile-content" aria-label="Intern profile">
            <div class="container">
                <!-- Injected by JS -->
                <div id="profile-loading" aria-live="polite" aria-busy="true">
                    <div class="shimmer-line" style="height:20px;width:60%;margin-bottom:12px"></div>
                    <div class="shimmer-line" style="width:40%;margin-bottom:32px"></div>
                    <div class="shimmer-line" style="height:120px"></div>
                </div>
            </div>
        </main>

    </div>

    <div class="toast-container" id="toast-container" aria-live="polite"></div>

    <script src="js/page-transition.js"></script>

    <script src="js/storage.js"></script>
    <script src="js/admin-popup.js"></script>
    <script src="js/profile-view.js"></script>
    <script src="js/theme-switcher.js"></script>
</body>

</html>
