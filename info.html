<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I.R.I.S — Information</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        .info-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            color: var(--clr-text-primary);

        .back-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: var(--clr-accent);
            color: white;

            transition: opacity 0.2s;
        }

        .back-btn:hover {
            opacity: 0.9;
        }
    </style>
